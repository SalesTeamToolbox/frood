# Paperclip + Frood deployment stack
# Usage: cp .env.paperclip.example .env.paperclip && nano .env.paperclip && docker compose -f docker-compose.paperclip.yml up -d
#
# Startup order (health-check gated):
#   1. postgresql, redis, qdrant (parallel, no dependencies)
#   2. frood-sidecar (waits for postgresql + redis + qdrant healthy)
#   3. paperclip (waits for frood-sidecar healthy)

services:
  postgresql:
    image: postgres:16
    env_file:
      - .env.paperclip
    environment:
      POSTGRES_DB: paperclip
      POSTGRES_USER: ${POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.paperclip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-paperclip} -d $${POSTGRES_DB:-paperclip}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__TELEMETRY_DISABLED: "true"

  frood-sidecar:
    build: .
    command: ["python", "frood.py", "--sidecar"]
    env_file:
      - .env.paperclip
    environment:
      SIDECAR_ENABLED: "true"
      DASHBOARD_HOST: "0.0.0.0"
      PAPERCLIP_SIDECAR_PORT: "8001"
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_ENABLED: "false"
      PAPERCLIP_API_URL: "http://paperclip:3000"
    ports:
      - "${SIDECAR_PORT:-8001}:8001"
    volumes:
      - frood-data:/app/.frood
    depends_on:
      - postgresql
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/sidecar/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  paperclip:
    # Use community image or build from source
    # image: paperclip/app:latest  # Official - requires building from source
    image: reeoss/paperclipai-paperclip:latest
    env_file:
      - .env.paperclip
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-paperclip}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-paperclip}"
      FROOD_SIDECAR_URL: "http://frood-sidecar:8001"
      REDIS_URL: "redis://redis:6379/0"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      PORT: "3000"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
    ports:
      - "${PAPERCLIP_PORT:-3000}:3000"
    depends_on:
      - frood-sidecar
    restart: unless-stopped

volumes:
  postgresql-data:
  redis-data:
  qdrant-data:
  frood-data:
