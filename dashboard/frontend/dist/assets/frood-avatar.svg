<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Frood Avatar — Towel icon, the essential hitchhiker's companion -->
  <circle cx="16" cy="16" r="16" fill="#1a2332"/>

  <!-- Folded towel -->
  <rect x="7" y="9" width="18" height="15" rx="2.5" fill="none" stroke="#E8A838" stroke-width="1.5"/>
  <!-- Fold line -->
  <line x1="16" y1="9" x2="16" y2="24" stroke="#E8A838" stroke-width="1" stroke-dasharray="2,1.5"/>
  <!-- Texture lines left -->
  <line x1="9" y1="14" x2="14" y2="14" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <line x1="9" y1="17" x2="14" y2="17" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <line x1="9" y1="20" x2="14" y2="20" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <!-- Texture lines right -->
  <line x1="18" y1="14" x2="23" y2="14" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="17" x2="23" y2="17" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="20" x2="23" y2="20" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  <!-- Hanging loop -->
  <path d="M13 9 Q13 5 16 5 Q19 5 19 9" fill="none" stroke="#E8A838" stroke-width="1.3"/>
</svg>
