<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Frood Favicon — Towel icon, app-icon style -->

  <!-- Background with rounded corners (app-icon shape) -->
  <rect width="32" height="32" rx="7" fill="#E8A838"/>

  <!-- Subtle inner glow / depth -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#D4922A" stroke-width="0.5" opacity="0.5"/>

  <!-- Folded towel — bold for small sizes -->
  <rect x="7" y="8" width="18" height="16" rx="3" fill="#fff" fill-opacity="0.25" stroke="#fff" stroke-width="1.8"/>
  <!-- Center fold -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="#fff" stroke-width="1.5" stroke-dasharray="2.5,1.5"/>
  <!-- Texture lines -->
  <line x1="9" y1="13" x2="14" y2="13" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="9" y1="17" x2="14" y2="17" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="18" y1="13" x2="23" y2="13" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <line x1="18" y1="17" x2="23" y2="17" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <!-- Hanging loop -->
  <path d="M13 8 Q13 3.5 16 3.5 Q19 3.5 19 8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
